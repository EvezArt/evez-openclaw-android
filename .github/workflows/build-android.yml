name: Build Android APK — Samsung Galaxy A16

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: evez-openclaw-debug-samsung-a16
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: evez-openclaw-release-samsung-a16
          path: app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v2.0.0-${{ github.run_number }}
          name: CLAW GOBLIN APK v2.0.${{ github.run_number }}
          body: |
            ## EVEZ OpenClaw Android APK
            Samsung Galaxy A16 optimized (ARM64-v8a, Android API 26+)
            
            ### What's in this build
            - WebView pointing to CLAW GOBLIN edge network
            - Fallback chain: CF Worker → Vercel → HuggingFace → GitHub Pages PWA
            - Swipe-to-refresh, offline error handling
            - Material Design 3 dark theme (#0a0a0a background)
            - Zero bundled models — all inference via edge API
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}